<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel - Kampoeng Quran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Mengembalikan style list (bullet & numbering) bawaan browser yang direset Tailwind */
        #detail-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1em; }
        #detail-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1em; }
        #detail-content li { display: list-item; margin-bottom: 0.25em; }
    </style>
</head>
<body class="text-slate-800 bg-slate-50 font-sans antialiased flex flex-col min-h-screen">

    <!-- Navbar Sederhana (Kembali ke Beranda) -->
    <nav class="fixed w-full z-50 bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex-shrink-0 flex items-center cursor-pointer">
                    <a href="/"><img src="https://lh3.googleusercontent.com/pw/AP1GczP_Kfkdxc3bS41NKjvCOUb3WzLL7EXJN7KkNZRrTRW7xI5kWbHCfEqTl4ID0zHV68jHAbZioXa4dytdtBqQaNYrzclMrLqZVh94NVJb0HNty5y0L6l33W_DrtGdxVr5LuCd2OQ7QZapLDPhYSQJgV1w=w435-h100-s-no-gm?authuser=0" alt="Logo" class="h-12 w-auto object-contain"></a>
                </div>
                <div class="flex items-center space-x-6">
                     <a href="/" class="text-sm font-semibold text-slate-600 hover:text-green-600"><i class="fas fa-arrow-left mr-2"></i>Kembali ke Beranda</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Konten Utama -->
    <main class="flex-grow pt-28 pb-20 relative">
        <div id="blog-list-view" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16 fade-in">
                <h2 class="text-3xl md:text-4xl font-bold text-green-700 mb-4">Kabar & Artikel</h2>
                <div class="w-24 h-1 bg-orange-500 mx-auto rounded-full mb-4"></div>
                <p class="text-slate-500">Informasi terbaru seputar kegiatan pesantren dan tulisan Islami.</p>
                
                <!-- Kotak Pencarian -->
                <div class="max-w-xl mx-auto mt-8 relative">
                    <input type="text" id="search-input" oninput="handleSearch()" placeholder="Cari judul atau isi artikel..." class="w-full pl-12 pr-4 py-3.5 rounded-full border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent shadow-sm transition-shadow text-slate-700 placeholder-slate-400">
                    <i class="fas fa-search absolute left-5 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                </div>
            </div>
            
            <!-- Grid Artikel -->
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="blog-grid">
                <div class="col-span-full py-20 text-center text-slate-500 animate-pulse">Memuat artikel...</div>
            </div>

            <!-- Kontrol Paginasi -->
            <div id="pagination-controls" class="flex justify-center items-center space-x-2 mt-12 hidden"></div>
        </div>

        <!-- Tampilan Detail Artikel -->
        <div id="blog-detail-view" class="hidden max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <button onclick="closeArticle()" class="mb-8 flex items-center text-green-700 hover:text-orange-500 font-semibold transition-colors group">
                <i class="fas fa-chevron-left mr-2 transform group-hover:-translate-x-1 transition-transform"></i> Kembali ke Daftar Artikel
            </button>
            
            <article class="bg-white pb-12 md:pb-16 pt-8 px-4 md:px-10 fade-in rounded-2xl shadow-sm border border-slate-100">
                <div id="detail-category" class="inline-block bg-emerald-100 text-emerald-800 text-xs font-bold px-3 py-1 rounded-full mb-4 border border-emerald-200">Kategori</div>
                <h1 id="detail-title" class="text-3xl md:text-5xl font-bold text-slate-800 mb-4 leading-tight">Judul Artikel</h1>
                <div class="flex flex-wrap items-center text-slate-500 mb-8 border-b border-slate-100 pb-4 text-sm md:text-base">
                    <span id="detail-date" class="text-orange-500 font-semibold mr-4 mb-2 md:mb-0"><i class="far fa-calendar-alt mr-1"></i> Tanggal</span>
                    <span class="mb-2 md:mb-0">Ditulis oleh <strong id="detail-author" class="text-slate-700">Admin</strong></span>
                </div>
                
                <img id="detail-img" src="" alt="Cover" class="w-full h-[300px] md:h-[500px] object-cover rounded-2xl mb-8 shadow-md">
                
                <!-- Audio Player Opsional -->
                <div id="detail-audio-container" class="hidden mb-8 w-full bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <audio id="detail-audio" controls class="w-full outline-none">
                        <source src="" type="audio/mpeg" />
                        Browser Anda tidak mendukung elemen pemutar audio.
                    </audio>
                </div>

                <div id="detail-content" class="prose prose-lg max-w-none text-slate-700 space-y-6 text-justify">
                    <!-- Konten artikel di sini (format HTML dari CMS) -->
                </div>

                <!-- Bagian Tombol Share Sosial Media -->
                <div class="mt-16 pt-8 border-t border-slate-200 flex flex-col md:flex-row justify-between items-center mb-12 bg-slate-50 p-6 rounded-2xl">
                    <div class="flex items-center text-lg font-bold text-slate-800 mb-6 md:mb-0">
                        <i class="fas fa-share-alt mr-3 text-emerald-600"></i> Bagikan Artikel Ini:
                    </div>
                    <div class="flex items-center space-x-3 sm:space-x-4" id="share-buttons">
                        <!-- Di-generate otomatis lewat JS agar link selalu up to date -->
                    </div>
                </div>

                <!-- ==================== FITUR BACA JUGA / RELATED POSTS (DI BAWAH) ==================== -->
                <div id="related-posts-section" class="mb-12 hidden">
                    <h3 class="text-xl md:text-2xl font-bold text-slate-800 mb-6 flex items-center"><i class="fas fa-book-reader mr-3 text-emerald-600"></i>Baca Juga:</h3>
                    
                    <!-- Mobile: Slide Horizontal | Desktop: Grid 3 Kolom 2 Baris -->
                    <div id="related-posts-container" class="flex md:grid md:grid-cols-3 overflow-x-auto md:overflow-x-visible gap-4 md:gap-6 pb-4 md:pb-0 snap-x snap-mandatory md:snap-none scrollbar-hide">
                        <!-- Konten di-generate lewat JS -->
                    </div>
                </div>
                <!-- ==================================================================================== -->

                <!-- Bagian Disqus -->
                <div class="bg-slate-50 p-4 md:p-10 rounded-2xl md:rounded-3xl border border-slate-200 shadow-sm mt-8">
                    <h3 class="text-xl md:text-2xl font-bold text-slate-800 mb-4 md:mb-6 flex items-center"><i class="far fa-comments mr-3 text-green-600"></i>Tinggalkan Komentar</h3>
                    <div class="bg-white p-2 md:p-6 rounded-xl shadow-inner w-full min-h-[300px]">
                        <div id="disqus_thread"></div>
                    </div>
                </div>
            </article>
        </div>
    </main>

    <!-- Footer Sederhana -->
    <footer class="bg-slate-900 text-slate-400 py-10 border-t-4 border-green-600 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
             <p class="text-sm">© 2024 Pesantren Kampoeng Quran.</p>
        </div>
    </footer>

    <!-- ==================== FITUR DAFTAR ARTIKEL MENGAMBANG ==================== -->
    <button onclick="toggleTOC()" class="fixed bottom-6 right-6 md:bottom-10 md:right-10 bg-emerald-600 hover:bg-emerald-700 text-white w-14 h-14 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.3)] flex items-center justify-center z-[60] transition-transform hover:scale-110 focus:outline-none">
        <i class="fas fa-book-open text-xl"></i>
    </button>

    <div id="toc-overlay" onclick="toggleTOC()" class="fixed inset-0 bg-slate-900/40 z-[65] hidden opacity-0 transition-opacity duration-300"></div>

    <div id="toc-drawer" class="fixed top-0 right-0 h-full w-80 max-w-[85vw] bg-slate-50 shadow-2xl z-[70] transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="bg-emerald-50 px-5 py-4 flex items-center justify-between border-b border-emerald-100">
            <h3 class="text-emerald-900 font-bold text-lg flex items-center"><i class="fas fa-list-ul mr-3 text-emerald-600"></i> Daftar Artikel</h3>
            <button onclick="toggleTOC()" class="text-emerald-700 hover:text-orange-500 focus:outline-none transition-colors"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div id="toc-content" class="flex-grow overflow-y-auto p-4 space-y-3 scrollbar-hide"></div>
        <div class="bg-white p-4 text-center border-t border-slate-200 text-slate-500 text-sm shadow-inner">
            Total <strong id="toc-total" class="text-emerald-600">0</strong> Artikel
        </div>
    </div>
    <!-- ========================================================================= -->

    <script>
        // Gunakan Shortname Disqus-mu di sini
        const disqusShortname = 'https-webqu-peach-vercel-app'; 
        
        // State Management
        let allArticles = [];
        let currentPage = 1;
        const itemsPerPage = 6;
        let searchQuery = ""; 

        // Data Dummy
        const dummyArticles = Array.from({ length: 7 }, (_, i) => ({
            id: i + 1, 
            title: `Membangun Generasi Qur'ani di Era Digital (Bagian ${i + 1})`,
            category: i % 2 === 0 ? "Tips & Inspirasi" : "Fiqih",
            excerpt: `Pesantren Kampoeng Quran terus berinovasi dalam memadukan kurikulum diniyah dan perkembangan teknologi terkini...`,
            date: `${i + 1} Nov 2023`, 
            thumbnail: "https://images.unsplash.com/photo-1543857778-c4a1a3e0b2eb?auto=format&fit=crop&q=80&w=400&h=250",
            author: "Admin Kampoeng",
            content: `<p>Pendidikan karakter di era digital saat ini menghadapi tantangan yang tidak pernah terbayangkan sebelumnya. Arus informasi yang begitu deras seringkali membawa dampak negatif jika tidak diimbangi dengan pondasi keimanan yang kuat.</p><p>[BACA_JUGA]</p><p>Pendekatan yang kami terapkan tidak sekadar melarang penggunaan gadget, melainkan mengajarkan adab, batasan, dan literasi digital yang Islami.</p>`
        }));

        const createSafeSlug = (title) => title.toString().toLowerCase().replace(/\s+/g, '-').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-').replace(/^-+|-+$/g, '');

        function toggleTOC() {
            const drawer = document.getElementById('toc-drawer');
            const overlay = document.getElementById('toc-overlay');
            if (drawer.classList.contains('translate-x-full')) {
                overlay.classList.remove('hidden');
                setTimeout(() => { overlay.classList.remove('opacity-0'); drawer.classList.remove('translate-x-full'); }, 10);
            } else {
                overlay.classList.add('opacity-0');
                drawer.classList.add('translate-x-full');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        function toggleCategory(catId) {
            const content = document.getElementById(catId);
            const icon = document.getElementById(`icon-${catId}`);
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden'); icon.classList.add('rotate-180');
            } else {
                content.classList.add('hidden'); icon.classList.remove('rotate-180');
            }
        }

        function handleTOCItemClick(slug) {
            toggleTOC(); 
            setTimeout(() => { openArticle(slug); }, 300); 
        }

        function generateTOC() {
            const tocContent = document.getElementById('toc-content');
            document.getElementById('toc-total').innerText = allArticles.length;
            const categories = {};
            allArticles.forEach(post => {
                const cat = post.category || 'Tanpa Kategori';
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(post);
            });
            let html = '';
            for (const [cat, posts] of Object.entries(categories)) {
                const catId = createSafeSlug(cat) + '-cat';
                html += `
                <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                    <button onclick="toggleCategory('${catId}')" class="w-full px-4 py-3.5 flex justify-between items-center bg-white hover:bg-emerald-50 focus:outline-none transition-colors">
                        <span class="font-bold text-slate-800 uppercase text-sm tracking-wide flex items-center">${cat} <span class="ml-2 text-slate-400 font-normal">(${posts.length})</span></span>
                        <i id="icon-${catId}" class="fas fa-chevron-down text-emerald-500 transition-transform duration-300"></i>
                    </button>
                    <div id="${catId}" class="hidden bg-slate-50 border-t border-slate-100 px-2 py-2 space-y-1">
                        ${posts.map(p => `<button onclick="handleTOCItemClick('${p.slug}')" class="block w-full text-left text-sm text-slate-600 hover:text-emerald-600 hover:bg-emerald-50 rounded-lg px-3 py-2.5 transition-colors border-b border-slate-100 last:border-0 truncate" title="${p.title}">&bull; ${p.title}</button>`).join('')}
                    </div>
                </div>`;
            }
            tocContent.innerHTML = html;
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
            currentPage = 1; 
            renderBlogList();
        }

        function highlightText(text, query) {
            if (!query || !text) return text;
            const safeQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${safeQuery})`, 'gi');
            return text.replace(regex, '<mark class="bg-yellow-300 text-slate-900 rounded-sm px-0.5">$1</mark>');
        }

        async function initBlog() {
            try {
                if (window.location.protocol === 'blob:' || window.location.protocol === 'data:' || window.location.origin === 'null') throw new Error("Sandbox env");
                const res = await fetch('/data/blog.json');
                if (res.ok) {
                    const data = await res.json();
                    allArticles = data.items || [];
                } else { allArticles = dummyArticles; }
            } catch (e) { allArticles = dummyArticles; }

            allArticles.forEach(a => {
                if (!a.slug) a.slug = createSafeSlug(a.title);
                if (!a.id) a.id = a.slug; 
            });

            generateTOC();

            const urlParams = new URLSearchParams(window.location.search);
            const slugParam = urlParams.get('artikel');
            const pathSegments = window.location.pathname.split('/');
            let directSlug = null;
            if(pathSegments.length > 2 && pathSegments[1] === 'blog' && pathSegments[2].endsWith('.html')) directSlug = pathSegments[2].replace('.html', '');
            const targetSlug = slugParam || directSlug;

            if (targetSlug) {
                const article = allArticles.find(a => a.slug === targetSlug);
                if (article) { openArticle(article.slug); return; }
            }

            renderBlogList();
            loadDisqusCountScript();
        }

        function renderBlogList() {
            const container = document.getElementById('blog-grid');
            const filteredArticles = allArticles.filter(post => {
                if (!searchQuery) return true;
                const titleMatch = post.title && post.title.toLowerCase().includes(searchQuery);
                const excerptMatch = post.excerpt && post.excerpt.toLowerCase().includes(searchQuery);
                const categoryMatch = post.category && post.category.toLowerCase().includes(searchQuery);
                return titleMatch || excerptMatch || categoryMatch;
            });

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const currentPosts = filteredArticles.slice(start, end);
            const totalPages = Math.ceil(filteredArticles.length / itemsPerPage);

            if (currentPosts.length === 0) {
                container.innerHTML = `<div class="col-span-full py-10 text-center text-slate-500 bg-white rounded-xl border border-slate-100">Maaf, tidak ada artikel yang cocok dengan pencarian <b>"${searchQuery}"</b>.</div>`;
                document.getElementById('pagination-controls').classList.add('hidden');
                return;
            }

            container.innerHTML = currentPosts.map(post => {
                const displayTitle = highlightText(post.title, searchQuery);
                const displayExcerpt = highlightText(post.excerpt, searchQuery);
                return `
                <div class="bg-white rounded-2xl shadow-md overflow-hidden flex flex-col h-full border border-slate-100 relative group">
                    <div class="absolute top-3 right-3 bg-white/95 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold text-emerald-700 shadow-sm border border-emerald-100 z-10 transition-transform group-hover:scale-105">${post.category || 'Tips & Inspirasi'}</div>
                    <div class="overflow-hidden"><img src="${post.thumbnail || post.image || 'https://via.placeholder.com/400x250?text=No+Image'}" class="w-full h-48 object-cover transition-transform duration-500 group-hover:scale-110"></div>
                    <div class="p-6 flex-grow flex flex-col">
                        <div class="flex items-center justify-between text-sm text-slate-500 mb-4">
                            <div class="flex items-center space-x-2"><div class="w-7 h-7 rounded-full bg-emerald-100 flex items-center justify-center border border-emerald-200"><i class="fas fa-user-circle text-emerald-600"></i></div><span class="font-semibold text-slate-700">${post.author || 'Admin'}</span></div>
                            <span class="text-orange-500 font-semibold">${post.date}</span>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 mb-3 leading-snug group-hover:text-emerald-700 transition-colors">${displayTitle}</h3>
                        <p class="text-slate-600 text-sm mb-6 flex-grow line-clamp-3">${displayExcerpt}</p>
                        <div class="mt-auto pt-4 border-t border-slate-100 flex justify-between items-center">
                            <button onclick="openArticle('${post.slug}')" class="text-green-700 font-bold hover:text-orange-500 transition-colors">Baca Selengkapnya &rarr;</button>
                            <div class="text-slate-400 text-sm flex items-center bg-slate-50 px-3 py-1 rounded-full border border-slate-100"><i class="far fa-comments mr-1.5"></i><span class="disqus-comment-count font-semibold" data-disqus-identifier="article-${post.id || post.slug}">0</span></div>
                        </div>
                    </div>
                </div>`
            }).join('');

            renderPagination(totalPages);
            setTimeout(() => { if (typeof window.DISQUSWIDGETS !== 'undefined') window.DISQUSWIDGETS.getCount({ reset: true }); }, 500);
        }

        function renderPagination(totalPages) {
            const paginationContainer = document.getElementById('pagination-controls');
            if (totalPages <= 1) { paginationContainer.classList.add('hidden'); return; }
            paginationContainer.classList.remove('hidden');
            let paginationHtml = `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="p-2 rounded-lg ${currentPage === 1 ? 'text-slate-300 cursor-not-allowed' : 'text-green-700 hover:bg-green-50'}"><i class="fas fa-chevron-left text-lg"></i></button>`;
            for (let i = 1; i <= totalPages; i++) { paginationHtml += `<button onclick="changePage(${i})" class="w-10 h-10 rounded-lg font-bold transition-colors ${currentPage === i ? 'bg-green-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'}">${i}</button>`; }
            paginationHtml += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="p-2 rounded-lg ${currentPage === totalPages ? 'text-slate-300 cursor-not-allowed' : 'text-green-700 hover:bg-green-50'}"><i class="fas fa-chevron-right text-lg"></i></button>`;
            paginationContainer.innerHTML = paginationHtml;
        }

        function changePage(page) {
            currentPage = page; renderBlogList(); document.getElementById('blog-list-view').scrollIntoView({ behavior: 'smooth' });
        }

        // ==================== FUNGSI MEMBUAT KOTAK BACA JUGA (INLINE / DI TENGAH TEKS) ====================
        function generateInlineRelatedPosts(currentPost) {
            const relatedPosts = allArticles.filter(p => p.category === currentPost.category && p.slug !== currentPost.slug);
            if (relatedPosts.length === 0) return ''; // Sembunyikan jika tidak ada artikel sejenis
            
            const maxRelated = relatedPosts.slice(0, 3); // Batasi maksimal 3 artikel saja!
            
            let html = `
                <div class="my-10 px-2 py-4 md:p-6 bg-emerald-50 rounded-2xl border border-emerald-100 shadow-sm not-prose">
                    <h4 class="text-lg md:text-xl font-bold text-emerald-800 mb-4 px-2 md:px-0 flex items-center">
                        <i class="fas fa-bookmark mr-2.5"></i> Baca Juga Terkait:
                    </h4>
                    
                    <!-- Mobile: Slide ke Samping | Desktop: List Vertikal -->
                    <div class="flex overflow-x-auto md:overflow-x-visible md:flex-col gap-4 pb-4 md:pb-0 px-2 md:px-0 snap-x snap-mandatory scrollbar-hide">
            `;
            
            maxRelated.forEach(post => {
                html += `
                    <div onclick="openArticle('${post.slug}')" class="flex-shrink-0 w-[85%] sm:w-[60%] md:w-full snap-start bg-white rounded-xl shadow-sm border border-slate-200 cursor-pointer group hover:shadow-md hover:border-emerald-400 transition-all flex flex-col md:flex-row overflow-hidden items-stretch">
                        <div class="w-full md:w-32 h-32 md:h-28 flex-shrink-0 overflow-hidden bg-slate-100">
                            <img src="${post.thumbnail || post.image || 'https://via.placeholder.com/400x250?text=No+Image'}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                        </div>
                        <div class="p-3 md:p-4 flex flex-col justify-center flex-grow">
                            <div class="text-[10px] md:text-xs font-bold text-emerald-600 uppercase tracking-wider mb-1 md:mb-1.5 flex flex-wrap items-center">
                                <span>${post.category || 'Artikel'}</span>
                                <span class="mx-1.5 text-slate-300">&bull;</span>
                                <span class="text-slate-500">${post.date}</span>
                            </div>
                            <h5 class="font-bold text-slate-800 text-sm md:text-base leading-snug group-hover:text-emerald-700 transition-colors line-clamp-2">${post.title}</h5>
                        </div>
                    </div>
                `;
            });
            
            html += `</div></div>`;
            return html;
        }

        // Fungsi Generate Postingan Terkait (Di Bawah)
        function renderRelatedPosts(currentPost) {
            const section = document.getElementById('related-posts-section');
            const container = document.getElementById('related-posts-container');
            const relatedPosts = allArticles.filter(p => p.category === currentPost.category && p.slug !== currentPost.slug);
            if (relatedPosts.length === 0) { section.classList.add('hidden'); return; }
            const maxRelated = relatedPosts.slice(0, 6);
            
            container.innerHTML = maxRelated.map(post => `
                <div onclick="openArticle('${post.slug}')" class="min-w-[240px] w-[75%] md:w-auto md:min-w-0 flex-shrink-0 md:flex-shrink snap-start md:snap-align-none bg-white rounded-xl shadow-sm border border-slate-100 cursor-pointer group hover:shadow-md hover:border-emerald-200 transition-all overflow-hidden flex flex-col">
                    <div class="overflow-hidden">
                        <img src="${post.thumbnail || post.image || 'https://via.placeholder.com/400x250?text=No+Image'}" class="w-full h-36 md:h-32 object-cover transition-transform duration-500 group-hover:scale-105">
                    </div>
                    <div class="p-4 flex flex-col flex-grow bg-white relative z-10">
                        <div class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex flex-wrap items-center">
                            <span>${post.category || 'Tips & Inspirasi'}</span><span class="mx-1.5 text-slate-300">&bull;</span><span>${post.date}</span>
                        </div>
                        <h4 class="font-bold text-slate-800 text-sm md:text-base leading-snug group-hover:text-emerald-700 transition-colors line-clamp-2">${post.title}</h4>
                    </div>
                </div>
            `).join('');
            section.classList.remove('hidden');
        }

        function openArticle(slug) {
            const post = allArticles.find(a => a.slug === slug);
            if(!post) return;

            document.getElementById('detail-category').innerText = post.category || 'Tips & Inspirasi';
            document.getElementById('detail-title').innerText = post.title;
            document.getElementById('detail-date').innerHTML = `<i class="far fa-calendar-alt mr-1"></i> ${post.date}`;
            document.getElementById('detail-author').innerText = post.author || 'Admin';
            document.getElementById('detail-img').src = post.thumbnail || post.image;
            
            // Proses isi konten, deteksi dan ubah tulisan [BACA_JUGA] menjadi kotak rekomendasi
            let rawContent = post.content || '';
            if (rawContent.includes('[BACA_JUGA]')) {
                rawContent = rawContent.replace(/(<p>)?\s*\[BACA_JUGA\]\s*(<\/p>)?/gi, generateInlineRelatedPosts(post));
            }
            
            // Pastikan format warna (foreColor) dari CMS tidak ditimpa oleh Tailwind
            rawContent = rawContent.replace(/<font\s+color="([^"]+)">/gi, '<span style="color: $1;">').replace(/<\/font>/gi, '</span>');
            
            document.getElementById('detail-content').innerHTML = rawContent;

            const audioContainer = document.getElementById('detail-audio-container');
            const audioElement = document.getElementById('detail-audio');
            if (post.audio) { audioElement.src = post.audio; audioContainer.classList.remove('hidden'); } 
            else { audioElement.src = ""; audioContainer.classList.add('hidden'); }

            const baseUrl = window.location.origin;
            const standardShareUrl = `${baseUrl}/blog/${post.slug}.html`;
            window.history.pushState({ path: standardShareUrl }, '', standardShareUrl);

            generateShareButtons(post.title, standardShareUrl);
            renderRelatedPosts(post);

            document.getElementById('blog-list-view').classList.add('hidden');
            document.getElementById('blog-detail-view').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            loadDisqus(post, standardShareUrl);
        }

        function closeArticle() {
            window.history.pushState({ path: '/blog.html' }, '', '/blog.html');
            document.getElementById('detail-audio').pause();
            document.getElementById('blog-detail-view').classList.add('hidden');
            document.getElementById('blog-list-view').classList.remove('hidden');
            renderBlogList(); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

                   <svg class="w-4 h-4 md:w-5 md:h-5 fill-current" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.008 3.827H5.078z"/></svg>

                <button onclick="navigator.clipboard.writeText('${currentUrl}'); alert('Tautan artikel berhasil disalin!');" class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-white border border-slate-300 text-slate-700 flex items-center justify-center hover:scale-110 transition-transform shadow-sm hover:bg-slate-100" title="Salin Tautan">

        function loadDisqus(post, shareUrl) {
            const identifier = `article-${post.id || post.slug}`;
            const url = shareUrl;

            if (window.DISQUS) {
                window.DISQUS.reset({
                    reload: true,
                    config: function () {
                        this.page.identifier = identifier;
                        this.page.url = url;
                        this.page.title = post.title;
                    }
                });
            } else {
                window.disqus_config = function () {
                    this.page.identifier = identifier;
                    this.page.url = url;
                    this.page.title = post.title;
                };
                const d = document, s = d.createElement('script');
                s.src = `https://${disqusShortname}.disqus.com/embed.js`;
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            }
        }

        function loadDisqusCountScript() {
            if (!document.getElementById('dsq-count-scr')) {
                const countScript = document.createElement('script');
                countScript.id = 'dsq-count-scr';
                countScript.src = `https://${disqusShortname}.disqus.com/count.js`;
                countScript.async = true;
                document.body.appendChild(countScript);
            }
        }

        document.addEventListener('DOMContentLoaded', initBlog);

        window.addEventListener('popstate', function(event) {
            const urlParams = new URLSearchParams(window.location.search);
            const slugParam = urlParams.get('artikel');
            if (slugParam) {
                const article = allArticles.find(a => a.slug === slugParam);
                if (article) openArticle(article.slug);
            } else {
                document.getElementById('blog-detail-view').classList.add('hidden');
                document.getElementById('blog-list-view').classList.remove('hidden');
                document.getElementById('detail-audio').pause();
            }
        });
    </script>
</body>
