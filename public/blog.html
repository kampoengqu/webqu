<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel - Kampoeng Quran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800 bg-slate-50 font-sans antialiased flex flex-col min-h-screen">

    <!-- Navbar Sederhana (Kembali ke Beranda) -->
    <nav class="fixed w-full z-50 bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex-shrink-0 flex items-center cursor-pointer">
                    <a href="/"><img src="https://lh3.googleusercontent.com/pw/AP1GczP_Kfkdxc3bS41NKjvCOUb3WzLL7EXJN7KkNZRrTRW7xI5kWbHCfEqTl4ID0zHV68jHAbZioXa4dytdtBqQaNYrzclMrLqZVh94NVJb0HNty5y0L6l33W_DrtGdxVr5LuCd2OQ7QZapLDPhYSQJgV1w=w435-h100-s-no-gm?authuser=0" alt="Logo" class="h-12 w-auto object-contain"></a>
                </div>
                <div class="flex items-center space-x-6">
                     <a href="/" class="text-sm font-semibold text-slate-600 hover:text-green-600"><i class="fas fa-arrow-left mr-2"></i>Kembali ke Beranda</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Konten Utama -->
    <main class="flex-grow pt-28 pb-20 relative">
        <div id="blog-list-view" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16 fade-in">
                <h2 class="text-3xl md:text-4xl font-bold text-green-700 mb-4">Kabar & Artikel</h2>
                <div class="w-24 h-1 bg-orange-500 mx-auto rounded-full mb-4"></div>
                <p class="text-slate-500">Informasi terbaru seputar kegiatan pesantren dan tulisan Islami.</p>
            </div>
            
            <!-- Grid Artikel -->
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="blog-grid">
                <div class="col-span-full py-20 text-center text-slate-500 animate-pulse">Memuat artikel...</div>
            </div>

            <!-- Kontrol Paginasi -->
            <div id="pagination-controls" class="flex justify-center items-center space-x-2 mt-12 hidden"></div>
        </div>

        <!-- Tampilan Detail Artikel -->
        <div id="blog-detail-view" class="hidden max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <button onclick="closeArticle()" class="mb-8 flex items-center text-green-700 hover:text-orange-500 font-semibold transition-colors group">
                <i class="fas fa-chevron-left mr-2 transform group-hover:-translate-x-1 transition-transform"></i> Kembali ke Daftar Artikel
            </button>
            
            <article class="bg-white pb-12 md:pb-16 pt-8 px-4 md:px-10 fade-in rounded-2xl shadow-sm border border-slate-100">
                <div id="detail-category" class="inline-block bg-emerald-100 text-emerald-800 text-xs font-bold px-3 py-1 rounded-full mb-4 border border-emerald-200">Kategori</div>
                <h1 id="detail-title" class="text-3xl md:text-5xl font-bold text-slate-800 mb-4 leading-tight">Judul Artikel</h1>
                <div class="flex flex-wrap items-center text-slate-500 mb-8 border-b border-slate-100 pb-4 text-sm md:text-base">
                    <span id="detail-date" class="text-orange-500 font-semibold mr-4 mb-2 md:mb-0"><i class="far fa-calendar-alt mr-1"></i> Tanggal</span>
                    <span class="mb-2 md:mb-0">Ditulis oleh <strong id="detail-author" class="text-slate-700">Admin</strong></span>
                </div>
                
                <img id="detail-img" src="" alt="Cover" class="w-full h-[300px] md:h-[500px] object-cover rounded-2xl mb-8 shadow-md">
                
                <!-- Audio Player Opsional -->
                <div id="detail-audio-container" class="hidden mb-8 w-full bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <audio id="detail-audio" controls class="w-full outline-none">
                        <source src="" type="audio/mpeg" />
                        Browser Anda tidak mendukung elemen pemutar audio.
                    </audio>
                </div>

                <div id="detail-content" class="prose prose-lg max-w-none text-slate-700 space-y-6 text-justify">
                    <!-- Konten artikel di sini (format HTML dari CMS) -->
                </div>

                <!-- Bagian Tombol Share Sosial Media -->
                <div class="mt-16 pt-8 border-t border-slate-200 flex flex-col md:flex-row justify-between items-center mb-12 bg-slate-50 p-6 rounded-2xl">
                    <div class="flex items-center text-lg font-bold text-slate-800 mb-6 md:mb-0">
                        <i class="fas fa-share-alt mr-3 text-emerald-600"></i> Bagikan Artikel Ini:
                    </div>
                    <div class="flex items-center space-x-3 sm:space-x-4" id="share-buttons">
                        <!-- Di-generate otomatis lewat JS agar link selalu up to date -->
                    </div>
                </div>

                <!-- Bagian Disqus -->
                <div class="bg-slate-50 p-4 md:p-10 rounded-2xl md:rounded-3xl border border-slate-200 shadow-sm mt-8">
                    <h3 class="text-xl md:text-2xl font-bold text-slate-800 mb-4 md:mb-6 flex items-center"><i class="far fa-comments mr-3 text-green-600"></i>Tinggalkan Komentar</h3>
                    <div class="bg-white p-2 md:p-6 rounded-xl shadow-inner w-full min-h-[300px]">
                        <div id="disqus_thread"></div>
                    </div>
                </div>
            </article>
        </div>
    </main>

    <!-- Footer Sederhana -->
    <footer class="bg-slate-900 text-slate-400 py-10 border-t-4 border-green-600 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
             <p class="text-sm">© 2024 Pesantren Kampoeng Quran.</p>
        </div>
    </footer>

    <script>
        // Gunakan Shortname Disqus-mu di sini
        const disqusShortname = 'https-webqu-peach-vercel-app'; 
        
        // State Management
        let allArticles = [];
        let currentPage = 1;
        const itemsPerPage = 6;

        // Data Dummy (Jadi 7 Artikel agar paginasi terlihat)
        const dummyArticles = Array.from({ length: 7 }, (_, i) => ({
            title: `Membangun Generasi Qur'ani di Era Digital (Bagian ${i + 1})`,
            category: i % 2 === 0 ? "Tips & Inspirasi" : "Fiqih",
            excerpt: `Pesantren Kampoeng Quran terus berinovasi dalam memadukan kurikulum diniyah dan perkembangan teknologi terkini...`,
            date: `${i + 1} Nov 2023`, 
            thumbnail: "https://images.unsplash.com/photo-1543857778-c4a1a3e0b2eb?auto=format&fit=crop&q=80&w=400&h=250",
            author: "Admin Kampoeng",
            content: `<p>Pendidikan karakter di era digital saat ini menghadapi tantangan yang tidak pernah terbayangkan sebelumnya. Arus informasi yang begitu deras seringkali membawa dampak negatif jika tidak diimbangi dengan pondasi keimanan yang kuat.</p><p>Pendekatan yang kami terapkan tidak sekadar melarang penggunaan gadget, melainkan mengajarkan adab, batasan, dan literasi digital yang Islami.</p>`
        }));

        const createSafeSlug = (title) => title.toString().toLowerCase().replace(/\s+/g, '-').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-').replace(/^-+|-+$/g, '');

        // Inisialisasi awal
        async function initBlog() {
            try {
                if (window.location.protocol === 'blob:' || window.location.protocol === 'data:' || window.location.origin === 'null') {
                    throw new Error("Sandbox env");
                }
                const res = await fetch('/data/blog.json');
                if (res.ok) {
                    const data = await res.json();
                    allArticles = data.items || [];
                } else {
                    allArticles = dummyArticles;
                }
            } catch (e) {
                allArticles = dummyArticles;
            }

            allArticles.forEach(a => {
                if (!a.slug) a.slug = createSafeSlug(a.title);
                if (!a.id) a.id = Date.now() + Math.floor(Math.random() * 1000); 
            });

            // Cek URL saat ini
            const urlParams = new URLSearchParams(window.location.search);
            const slugParam = urlParams.get('artikel');
            
            // Jika pengunjung datang melalui file cangkang WA (misal: /blog/slug-artikel.html)
            // Namun URL diredirect secara SPA oleh Vercel
            const pathSegments = window.location.pathname.split('/');
            let directSlug = null;
            if(pathSegments.length > 2 && pathSegments[1] === 'blog' && pathSegments[2].endsWith('.html')) {
                directSlug = pathSegments[2].replace('.html', '');
            }

            const targetSlug = slugParam || directSlug;

            if (targetSlug) {
                const article = allArticles.find(a => a.slug === targetSlug);
                if (article) {
                    openArticle(article.slug);
                    return; 
                }
            }

            renderBlogList();
            loadDisqusCountScript();
        }

        function renderBlogList() {
            const container = document.getElementById('blog-grid');
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const currentPosts = allArticles.slice(start, end);
            const totalPages = Math.ceil(allArticles.length / itemsPerPage);

            if (currentPosts.length === 0) {
                container.innerHTML = `<div class="col-span-full py-10 text-center text-slate-500 bg-white rounded-xl border border-slate-100">Belum ada artikel dipublikasikan.</div>`;
                document.getElementById('pagination-controls').classList.add('hidden');
                return;
            }

            container.innerHTML = currentPosts.map(post => `
                <div class="bg-white rounded-2xl shadow-md overflow-hidden flex flex-col h-full border border-slate-100 relative">
                    <div class="absolute top-3 right-3 bg-white/95 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold text-emerald-700 shadow-sm border border-emerald-100 z-10">
                        ${post.category || 'Tips & Inspirasi'}
                    </div>
                    <img src="${post.thumbnail || post.image || 'https://via.placeholder.com/400x250?text=No+Image'}" class="w-full h-48 object-cover">
                    <div class="p-6 flex-grow flex flex-col">
                        <div class="flex items-center justify-between text-sm text-slate-500 mb-4">
                            <div class="flex items-center space-x-2">
                                <div class="w-7 h-7 rounded-full bg-emerald-100 flex items-center justify-center border border-emerald-200">
                                   <i class="fas fa-user-circle text-emerald-600"></i>
                                </div>
                                <span class="font-semibold text-slate-700">${post.author || 'Admin'}</span>
                            </div>
                            <span class="text-orange-500 font-semibold">${post.date}</span>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 mb-3 leading-snug">${post.title}</h3>
                        <p class="text-slate-600 text-sm mb-6 flex-grow">${post.excerpt}</p>
                        <div class="mt-auto pt-4 border-t border-slate-100 flex justify-between items-center">
                            <button onclick="openArticle('${post.slug}')" class="text-green-700 font-bold hover:text-orange-500 transition-colors">Baca Selengkapnya &rarr;</button>
                            <div class="text-slate-400 text-sm flex items-center bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                                <i class="far fa-comments mr-1.5"></i>
                                <span class="disqus-comment-count font-semibold" data-disqus-identifier="article-${post.id || post.slug}">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            renderPagination(totalPages);

            setTimeout(() => {
                if (typeof window.DISQUSWIDGETS !== 'undefined') {
                    window.DISQUSWIDGETS.getCount({ reset: true });
                }
            }, 500);
        }

        function renderPagination(totalPages) {
            const paginationContainer = document.getElementById('pagination-controls');
            if (totalPages <= 1) {
                paginationContainer.classList.add('hidden');
                return;
            }

            paginationContainer.classList.remove('hidden');
            let paginationHtml = '';
            
            paginationHtml += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="p-2 rounded-lg ${currentPage === 1 ? 'text-slate-300 cursor-not-allowed' : 'text-green-700 hover:bg-green-50'}"><i class="fas fa-chevron-left text-lg"></i></button>`;

            for (let i = 1; i <= totalPages; i++) {
                paginationHtml += `<button onclick="changePage(${i})" class="w-10 h-10 rounded-lg font-bold transition-colors ${currentPage === i ? 'bg-green-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'}">${i}</button>`;
            }

            paginationHtml += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="p-2 rounded-lg ${currentPage === totalPages ? 'text-slate-300 cursor-not-allowed' : 'text-green-700 hover:bg-green-50'}"><i class="fas fa-chevron-right text-lg"></i></button>`;
            paginationContainer.innerHTML = paginationHtml;
        }

        function changePage(page) {
            currentPage = page;
            renderBlogList();
            document.getElementById('blog-list-view').scrollIntoView({ behavior: 'smooth' });
        }

        function openArticle(slug) {
            const post = allArticles.find(a => a.slug === slug);
            if(!post) return;

            // Mengisi data UI Detail
            document.getElementById('detail-category').innerText = post.category || 'Tips & Inspirasi';
            document.getElementById('detail-title').innerText = post.title;
            document.getElementById('detail-date').innerHTML = `<i class="far fa-calendar-alt mr-1"></i> ${post.date}`;
            document.getElementById('detail-author').innerText = post.author || 'Admin';
            document.getElementById('detail-img').src = post.thumbnail || post.image;
            document.getElementById('detail-content').innerHTML = post.content || '';

            // Fitur Audio
            const audioContainer = document.getElementById('detail-audio-container');
            const audioElement = document.getElementById('detail-audio');
            if (post.audio) {
                audioElement.src = post.audio;
                audioContainer.classList.remove('hidden');
            } else {
                audioElement.src = "";
                audioContainer.classList.add('hidden');
            }

            // MENGUBAH URL ADDRESS BAR MENJADI LINK CANGKANG HTML (SUPER TRICK!)
            // Agar jika dikopi dari address bar, WA langsung membaca file cangkangnya.
            const baseUrl = window.location.origin;
            const standardShareUrl = `${baseUrl}/blog/${post.slug}.html`;
            
            // Push State mengelabui URL tanpa me-refresh browser
            window.history.pushState({ path: standardShareUrl }, '', standardShareUrl);

            // Generate Tombol Share (Memberikan URL cangkang agar thumbnail WA terbaca)
            generateShareButtons(post.title, standardShareUrl);

            // Transisi View
            document.getElementById('blog-list-view').classList.add('hidden');
            document.getElementById('blog-detail-view').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // Panggil Disqus menggunakan URL cangkang agar konsisten
            loadDisqus(post, standardShareUrl);
        }

        function closeArticle() {
            // Hapus parameter artikel dari URL dan kembalikan ke format awal saat ditutup
            window.history.pushState({ path: '/blog.html' }, '', '/blog.html');
            
            document.getElementById('detail-audio').pause();
            document.getElementById('blog-detail-view').classList.add('hidden');
            document.getElementById('blog-list-view').classList.remove('hidden');
            
            renderBlogList(); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function generateShareButtons(title, currentUrl) {
            const shareContainer = document.getElementById('share-buttons');
            const encodedTitle = encodeURIComponent(title);
            const encodedUrl = encodeURIComponent(currentUrl);

            shareContainer.innerHTML = `
                <!-- WhatsApp -->
                <a href="https://wa.me/?text=${encodedTitle}%20-%20${encodedUrl}" target="_blank" rel="noopener noreferrer" class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-[#25D366] text-white flex items-center justify-center hover:scale-110 transition-transform shadow-md" title="Bagikan ke WhatsApp">
                   <svg class="w-5 h-5 md:w-6 md:h-6 fill-current" viewBox="0 0 24 24"><path d="M12.012 2c-5.506 0-9.989 4.478-9.99 9.984a9.964 9.964 0 001.333 4.993L2 22l5.233-1.237a9.994 9.994 0 004.779 1.217h.004c5.505 0 9.988-4.478 9.989-9.984 0-2.669-1.037-5.176-2.926-7.066A9.94 9.94 0 0012.012 2zm5.826 14.21c-.246.696-1.438 1.341-1.986 1.411-.46.059-1.045.132-3.344-.82-2.94-1.217-4.81-4.225-4.956-4.422-.146-.197-1.183-1.576-1.183-3.003 0-1.427.738-2.133 1.002-2.428.264-.296.574-.37.766-.37.191 0 .383.002.551.01.197.01.464-.075.727.562.274.664.935 2.276 1.017 2.443.082.167.137.362.027.587-.11.226-.164.363-.328.555-.164.192-.345.419-.493.575-.164.175-.338.368-.148.667.191.299.849 1.365 1.82 2.221 1.255 1.107 2.298 1.448 2.599 1.589.301.141.476.12.656-.098.181-.219.782-.907.99-1.218.208-.311.416-.258.69-.153.274.104 1.733.818 2.035.965.301.146.503.219.574.34.071.121.071.706-.175 1.402z"/></svg>
                </a>
                
                <!-- Facebook -->
                <a href="https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}" target="_blank" rel="noopener noreferrer" class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-[#1877F2] text-white flex items-center justify-center hover:scale-110 transition-transform shadow-md" title="Bagikan ke Facebook">
                   <svg class="w-5 h-5 md:w-6 md:h-6 fill-current" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                </a>
                
                <!-- X (Twitter) -->
                <a href="https://twitter.com/intent/tweet?text=${encodedTitle}&url=${encodedUrl}" target="_blank" rel="noopener noreferrer" class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-black text-white flex items-center justify-center hover:scale-110 transition-transform shadow-md" title="Bagikan ke X (Twitter)">
                   <svg class="w-4 h-4 md:w-5 md:h-5 fill-current" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.008 3.827H5.078z"/></svg>
                </a>
                
                <!-- Copy Link -->
                <button onclick="navigator.clipboard.writeText('${currentUrl}'); alert('Tautan artikel berhasil disalin!');" class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-white border border-slate-300 text-slate-700 flex items-center justify-center hover:scale-110 transition-transform shadow-sm hover:bg-slate-100" title="Salin Tautan">
                   <svg class="w-5 h-5 md:w-6 md:h-6 fill-current" viewBox="0 0 24 24"><path d="M13.791 10.533c.809-.809 2.119-.809 2.928 0l3.536 3.535c.809.809.809 2.119 0 2.928l-3.536 3.536c-.809.809-2.119.809-2.928 0a.75.75 0 011.061-1.061c.223.223.584.223.807 0l3.536-3.536c.223-.223.223-.584 0-.807l-3.536-3.535c-.223-.223-.584-.223-.807 0a.75.75 0 01-1.061-1.06z"/><path d="M10.209 13.467c-.809.809-2.119.809-2.928 0L3.745 9.932c-.809-.809-.809-2.119 0-2.928l3.536-3.536c.809-.809 2.119-.809 2.928 0a.75.75 0 01-1.061 1.061c-.223-.223-.584-.223-.807 0L4.805 8.064c-.223.223-.223.584 0 .807l3.536 3.535c.223.223.584.223.807 0a.75.75 0 011.061 1.061z"/><path d="M8.404 15.596a.75.75 0 010-1.061l7.192-7.192a.75.75 0 011.061 1.061l-7.192 7.192a.75.75 0 01-1.061 0z"/></svg>
                </button>
            `;
        }

        function loadDisqus(post, shareUrl) {
            const identifier = `article-${post.id || post.slug}`;
            const url = shareUrl; // Gunakan URL cangkang standar agar link Disqus konsisten

            if (window.DISQUS) {
                window.DISQUS.reset({
                    reload: true,
                    config: function () {
                        this.page.identifier = identifier;
                        this.page.url = url;
                        this.page.title = post.title;
                    }
                });
            } else {
                window.disqus_config = function () {
                    this.page.identifier = identifier;
                    this.page.url = url;
                    this.page.title = post.title;
                };
                const d = document, s = d.createElement('script');
                s.src = `https://${disqusShortname}.disqus.com/embed.js`;
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            }
        }

        function loadDisqusCountScript() {
            if (!document.getElementById('dsq-count-scr')) {
                const countScript = document.createElement('script');
                countScript.id = 'dsq-count-scr';
                countScript.src = `https://${disqusShortname}.disqus.com/count.js`;
                countScript.async = true;
                document.body.appendChild(countScript);
            }
        }

        // Mulai aplikasi
        document.addEventListener('DOMContentLoaded', initBlog);

        // Menangani tombol back/forward di browser
        window.addEventListener('popstate', function(event) {
            const urlParams = new URLSearchParams(window.location.search);
            const slugParam = urlParams.get('artikel');
            if (slugParam) {
                const article = allArticles.find(a => a.slug === slugParam);
                if (article) openArticle(article.slug);
            } else {
                document.getElementById('blog-detail-view').classList.add('hidden');
                document.getElementById('blog-list-view').classList.remove('hidden');
                document.getElementById('detail-audio').pause();
            }
        });
    </script>
</body>
</html>
