<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel - Kampoeng Quran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800 bg-slate-50 font-sans antialiased flex flex-col min-h-screen">

    <!-- Navbar Sederhana (Kembali ke Beranda) -->
    <nav class="fixed w-full z-50 bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex-shrink-0 flex items-center cursor-pointer">
                    <a href="/"><img src="https://lh3.googleusercontent.com/pw/AP1GczP_Kfkdxc3bS41NKjvCOUb3WzLL7EXJN7KkNZRrTRW7xI5kWbHCfEqTl4ID0zHV68jHAbZioXa4dytdtBqQaNYrzclMrLqZVh94NVJb0HNty5y0L6l33W_DrtGdxVr5LuCd2OQ7QZapLDPhYSQJgV1w=w435-h100-s-no-gm?authuser=0" alt="Logo" class="h-12 w-auto object-contain"></a>
                </div>
                <div class="flex items-center space-x-6">
                     <a href="/" class="text-sm font-semibold text-slate-600 hover:text-green-600"><i class="fas fa-arrow-left mr-2"></i>Kembali ke Beranda</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Konten Utama -->
    <main class="flex-grow pt-28 pb-20 relative">
        <div id="blog-list-view" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16 fade-in">
                <h2 class="text-3xl md:text-4xl font-bold text-green-700 mb-4">Kabar & Artikel</h2>
                <div class="w-24 h-1 bg-orange-500 mx-auto rounded-full mb-4"></div>
                <p class="text-slate-500">Informasi terbaru seputar kegiatan pesantren dan tulisan Islami.</p>
            </div>
            
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="blog-grid">
                <!-- Artikel akan di-render di sini oleh JavaScript -->
            </div>
        </div>

        <!-- Tampilan Detail Artikel -->
        <div id="blog-detail-view" class="hidden max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <button onclick="closeArticle()" class="mb-8 flex items-center text-green-700 hover:text-orange-500 font-semibold transition-colors group">
                <i class="fas fa-chevron-left mr-2 transform group-hover:-translate-x-1 transition-transform"></i> Kembali ke Daftar Artikel
            </button>
            
            <article class="bg-white pb-16 pt-8 px-6 md:px-10 fade-in rounded-2xl shadow-sm border border-slate-100">
                <h1 id="detail-title" class="text-3xl md:text-5xl font-bold text-slate-800 mb-4 leading-tight"></h1>
                <div class="flex items-center text-slate-500 mb-8 border-b border-slate-100 pb-4">
                    <span id="detail-date" class="text-orange-500 font-semibold mr-4"></span>
                    <span>Ditulis oleh <strong id="detail-author"></strong></span>
                </div>
                <img id="detail-img" src="" alt="Cover" class="w-full h-[300px] md:h-[500px] object-cover rounded-2xl mb-10 shadow-md">
                
                <div id="detail-content" class="prose prose-lg max-w-none text-slate-700 space-y-6">
                    <!-- Konten artikel di sini -->
                </div>

                <div class="mt-12 pt-8 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center mb-12">
                    <p class="text-slate-500 font-medium mb-4 sm:mb-0">Bagikan artikel ini ke keluarga dan sahabat.</p>
                    <button onclick="alert('Link disalin!')" class="bg-green-50 text-green-700 hover:bg-green-100 font-semibold py-2 px-6 rounded-full transition-colors">Salin Link Tautan</button>
                </div>

                <!-- Bagian Disqus -->
                <div class="bg-slate-50 p-6 sm:p-10 rounded-3xl border border-slate-200 shadow-sm mt-8">
                    <h3 class="text-2xl font-bold text-slate-800 mb-6 flex items-center"><i class="far fa-comments mr-3 text-green-600"></i>Tinggalkan Komentar</h3>
                    <div class="bg-white p-4 rounded-xl shadow-inner w-full min-h-[300px]">
                        <div id="disqus_thread"></div>
                    </div>
                </div>
            </article>
        </div>
    </main>

    <!-- Footer Sederhana -->
    <footer class="bg-slate-900 text-slate-400 py-10 border-t-4 border-green-600 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
             <p class="text-sm">© 2024 Pesantren Kampoeng Quran.</p>
        </div>
    </footer>

    <script>
        // Data Dummy
        const articleImages = [
            "https://images.unsplash.com/photo-1543857778-c4a1a3e0b2eb?auto=format&fit=crop&q=80&w=400&h=250", 
            "https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&q=80&w=400&h=250", 
            "https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?auto=format&fit=crop&q=80&w=400&h=250"
        ];
        const allArticles = Array.from({ length: 6 }, (_, i) => ({
            id: i + 1, 
            title: `Membangun Generasi Qur'ani di Era Digital (Bagian ${i + 1})`,
            excerpt: `Pesantren Kampoeng Quran terus berinovasi dalam memadukan kurikulum diniyah dan perkembangan teknologi terkini...`,
            date: `${i + 1} Nov 2023`, 
            image: articleImages[i % articleImages.length],
            author: "Admin Kampoeng",
            content: [
                `Pendidikan karakter di era digital saat ini menghadapi tantangan yang tidak pernah terbayangkan sebelumnya. Arus informasi yang begitu deras seringkali membawa dampak negatif jika tidak diimbangi dengan pondasi keimanan yang kuat.`,
                `Pendekatan yang kami terapkan tidak sekadar melarang penggunaan gadget, melainkan mengajarkan adab, batasan, dan literasi digital yang Islami.`
            ]
        }));

        // PERBAIKAN PENTING: Gunakan shortname aslimu dari Vercel
        const disqusShortname = 'https-webqu-peach-vercel-app'; 

        function renderBlogList() {
            const container = document.getElementById('blog-grid');
            container.innerHTML = allArticles.map((post, index) => `
                <div class="bg-white rounded-2xl shadow-md overflow-hidden flex flex-col h-full border border-slate-100 cursor-pointer hover:shadow-xl transition-shadow" onclick="openArticle(${index})">
                    <img src="${post.image}" class="w-full h-48 object-cover">
                    <div class="p-6 flex-grow flex flex-col">
                        <div class="flex items-center justify-between text-sm text-slate-500 mb-4">
                            <div class="flex items-center space-x-2">
                                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=facearea&facepad=2&w=100&h=100&q=80" class="w-7 h-7 rounded-full object-cover border border-slate-200">
                                <span class="font-semibold text-slate-700">${post.author}</span>
                            </div>
                            <span class="text-orange-500 font-semibold">${post.date}</span>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 mb-3 leading-snug hover:text-green-600">${post.title}</h3>
                        <p class="text-slate-600 text-sm mb-6 flex-grow">${post.excerpt}</p>
                        <div class="mt-auto pt-4 border-t border-slate-100">
                            <span class="text-green-700 font-bold">Baca Selengkapnya &rarr;</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openArticle(index) {
            const post = allArticles[index];
            if(!post) return;

            document.getElementById('detail-title').innerText = post.title;
            document.getElementById('detail-date').innerText = post.date;
            document.getElementById('detail-author').innerText = post.author;
            document.getElementById('detail-img').src = post.image;
            
            document.getElementById('detail-content').innerHTML = post.content.map(p => `<p class="leading-relaxed">${p}</p>`).join('');

            document.getElementById('blog-list-view').classList.add('hidden');
            document.getElementById('blog-detail-view').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            loadDisqus(post);
        }

        function closeArticle() {
            document.getElementById('blog-detail-view').classList.add('hidden');
            document.getElementById('blog-list-view').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function loadDisqus(post) {
            const identifier = `article-${post.id}`;
            // Memastikan URL persis sama dengan yang didaftarkan di Disqus Trusted Domains
            const url = `https://webqu-peach.vercel.app/blog.html?id=${post.id}`;

            if (window.DISQUS) {
                window.DISQUS.reset({
                    reload: true,
                    config: function () {
                        this.page.identifier = identifier;
                        this.page.url = url;
                        this.page.title = post.title;
                    }
                });
            } else {
                window.disqus_config = function () {
                    this.page.identifier = identifier;
                    this.page.url = url;
                    this.page.title = post.title;
                };
                const d = document, s = d.createElement('script');
                s.src = `https://${disqusShortname}.disqus.com/embed.js`;
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            }
        }

        // Inisialisasi
        document.addEventListener('DOMContentLoaded', renderBlogList);
    </script>
</body>
</html>
